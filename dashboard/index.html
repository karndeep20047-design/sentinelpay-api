<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SentinelPay — AI-Powered Secure Payment Processing Dashboard">
  <title>SentinelPay Dashboard</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons@4.29.0/dist/feather.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --bg-card:     #161b22;
      --bg-hover:    #1c2128;
      --bg-input:    #0d1117;
      --accent:      #00d395;
      --accent-dim:  rgba(0, 211, 149, 0.10);
      --accent-glow: rgba(0, 211, 149, 0.22);
      --danger:      #ff4444;
      --danger-dim:  rgba(255, 68, 68, 0.10);
      --warning:     #ff8c00;
      --warning-dim: rgba(255, 140, 0, 0.10);
      --blue:        #388bfd;
      --blue-dim:    rgba(56, 139, 253, 0.10);
      --purple:      #a371f7;
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --text-dim:    #6e7681;
      --border:      #30363d;
      --border-lt:   #21262d;
      --r:           12px;
      --r-sm:        8px;
      --r-xs:        6px;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── SCROLLBAR ─────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* ── HEADER ────────────────────────────────────────── */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: 58px;
      background: rgba(13, 17, 23, 0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 20px; gap: 20px;
    }

    .brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; flex-shrink: 0;
    }
    .brand-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--accent) 0%, #00a876 100%);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      color: #000; flex-shrink: 0;
    }
    .brand-icon svg { width: 16px; height: 16px; stroke-width: 2.5; }
    .brand-name {
      font-size: 1.05rem; font-weight: 800;
      letter-spacing: -0.03em; color: var(--text);
    }
    .brand-name em { color: var(--accent); font-style: normal; }

    /* ── TAB NAV ───────────────────────────────────────── */
    .tab-nav {
      display: flex; align-items: center; gap: 2px;
      flex: 1; overflow-x: auto; scrollbar-width: none;
    }
    .tab-nav::-webkit-scrollbar { display: none; }

    .tab-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      border: none; background: transparent;
      color: var(--text-muted);
      font-family: inherit; font-size: 0.825rem; font-weight: 500;
      cursor: pointer; border-radius: var(--r-xs);
      transition: all 0.14s ease; white-space: nowrap;
    }
    .tab-btn svg { width: 14px; height: 14px; }
    .tab-btn:hover { color: var(--text); background: var(--bg-hover); }
    .tab-btn.active { color: var(--accent); background: var(--accent-dim); }
    .tab-btn.is-admin { color: var(--warning); }
    .tab-btn.is-admin.active { color: var(--warning); background: var(--warning-dim); }

    /* ── HEADER RIGHT ──────────────────────────────────── */
    .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    .user-pill {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 10px 5px 6px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 99px;
    }
    .user-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #00a876);
      color: #000; font-size: 0.6rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .user-email-sm { font-size: 0.78rem; font-weight: 600; color: var(--text); }
    .user-role-sm  { font-size: 0.65rem; color: var(--text-muted); font-weight: 500; }

    /* ── MAIN ──────────────────────────────────────────── */
    .main {
      margin-top: 58px;
      padding: 28px 24px 48px;
      max-width: 1160px;
      margin-left: auto; margin-right: auto;
    }
    @media (max-width: 600px) { .main { padding: 20px 14px 40px; } }

    /* ── PAGE HEADER ───────────────────────────────────── */
    .page-hd {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
      margin-bottom: 24px;
    }
    .page-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.03em; }
    .page-sub   { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; }

    /* ── CARD ──────────────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 22px;
    }
    .card-hd {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px;
    }
    .card-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.92rem; font-weight: 600; color: var(--text);
    }
    .card-title svg { width: 15px; height: 15px; color: var(--accent); }

    /* ── GRID ──────────────────────────────────────────── */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .g3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .g4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }

    @media (max-width: 960px) { .g4 { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 680px) {
      .g2, .g3, .g4 { grid-template-columns: 1fr; }
    }

    /* ── BUTTONS ───────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 16px;
      border: none; border-radius: var(--r-sm);
      font-family: inherit; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all 0.14s ease;
      text-decoration: none; white-space: nowrap;
    }
    .btn svg { width: 14px; height: 14px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    .btn-primary  { background: var(--accent); color: #000; }
    .btn-primary:hover:not(:disabled) { background: #00be88; transform: translateY(-1px); }

    .btn-ghost    { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { background: var(--bg-hover); color: var(--text); }

    .btn-danger   { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(255,68,68,.18); }
    .btn-danger:hover:not(:disabled) { background: rgba(255,68,68,.18); }

    .btn-warn     { background: var(--warning-dim); color: var(--warning); border: 1px solid rgba(255,140,0,.18); }

    .btn-sm   { padding: 6px 12px; font-size: 0.78rem; }
    .btn-full { width: 100%; justify-content: center; }

    /* ── FORMS ─────────────────────────────────────────── */
    .fg       { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .fg:last-of-type { margin-bottom: 0; }
    .flabel   {
      font-size: 0.72rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    .finput {
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 9px 13px;
      color: var(--text); font-family: inherit; font-size: 0.88rem;
      transition: border-color .14s, box-shadow .14s; outline: none; width: 100%;
    }
    .finput::placeholder { color: var(--text-dim); }
    .finput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* ── BADGES ────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 99px;
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .badge::before {
      content: ''; width: 5px; height: 5px;
      border-radius: 50%; background: currentColor;
    }
    .b-green  { background: var(--accent-dim);  color: var(--accent);   }
    .b-red    { background: var(--danger-dim);  color: var(--danger);   }
    .b-orange { background: var(--warning-dim); color: var(--warning);  }
    .b-blue   { background: var(--blue-dim);    color: var(--blue);     }
    .b-purple { background: rgba(163,113,247,.12); color: var(--purple); }
    .b-gray   { background: rgba(139,148,158,.12); color: var(--text-muted); }

    .role-badge {
      font-size: 0.62rem; font-weight: 700;
      padding: 2px 7px; border-radius: 99px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .r-admin    { background: var(--warning-dim); color: var(--warning); }
    .r-customer { background: var(--accent-dim);  color: var(--accent);  }
    .r-employee { background: var(--blue-dim);    color: var(--blue);    }

    /* ── SPINNER ───────────────────────────────────────── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.12);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .65s linear infinite;
      display: inline-block; flex-shrink: 0;
    }
    .sp-sm { width: 14px; height: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-box {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 52px 24px;
      color: var(--text-muted); font-size: 0.85rem;
    }

    /* ── TABLES ────────────────────────────────────────── */
    .tbl-wrap { overflow-x: auto; margin: 0 -22px; padding: 0; }
    table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    thead th {
      text-align: left; padding: 10px 18px;
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody td { padding: 13px 18px; border-bottom: 1px solid var(--border-lt); color: var(--text); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--bg-hover); }
    .mono { font-family: 'SF Mono', Consolas, monospace; font-size: 0.80rem; }

    /* ── TOASTS ────────────────────────────────────────── */
    #toasts {
      position: fixed; top: 72px; right: 16px; z-index: 999;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }
    .toast {
      padding: 11px 16px; border-radius: var(--r-sm);
      display: flex; align-items: center; gap: 10px;
      font-size: 0.83rem; font-weight: 500;
      border-left: 3px solid; max-width: 340px;
      pointer-events: auto;
      background: rgba(22, 27, 34, 0.98);
      backdrop-filter: blur(20px);
      animation: tIn .28s ease;
    }
    .toast svg { width: 15px; height: 15px; flex-shrink: 0; }
    .toast-ok   { border-color: var(--accent);  }
    .toast-err  { border-color: var(--danger);  }
    .toast-warn { border-color: var(--warning); }
    @keyframes tIn  { from { opacity:0; transform:translateX(16px); } to { opacity:1; transform:none; } }
    @keyframes tOut { from { opacity:1; transform:none; } to { opacity:0; transform:translateX(16px); } }

    /* ── PRESET BUTTONS (Auth) ─────────────────────────── */
    .preset-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 14px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--r-sm); cursor: pointer; text-align: left;
      color: var(--text); font-family: inherit;
      transition: all .14s ease;
    }
    .preset-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
    .p-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 800; flex-shrink: 0;
    }
    .p-name  { font-size: 0.85rem; font-weight: 600; }
    .p-email { font-size: 0.74rem; color: var(--text-muted); margin-top: 1px; }

    /* ── BALANCE CARD ──────────────────────────────────── */
    .balance-card {
      background: linear-gradient(135deg, #0b2117 0%, var(--bg-card) 70%);
      border-color: rgba(0,211,149,.18);
      position: relative; overflow: hidden;
    }
    .balance-card::before {
      content: ''; position: absolute; top: -60px; right: -60px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(0,211,149,.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .balance-lbl {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--accent); margin-bottom: 8px;
    }
    .balance-amt {
      font-size: 2.8rem; font-weight: 900;
      letter-spacing: -0.04em; line-height: 1;
    }
    .balance-cur { font-size: 1.1rem; font-weight: 600; color: var(--text-muted); margin-right: 3px; }
    .balance-dec { font-size: 1.3rem; color: var(--text-muted); }
    .balance-acc {
      margin-top: 14px; font-size: 0.82rem; color: var(--text-muted);
      display: flex; align-items: center; gap: 8px;
    }
    .balance-acc code {
      font-family: monospace; font-size: 0.88rem;
      background: rgba(0,0,0,.25); padding: 2px 8px;
      border-radius: 4px; color: var(--text); letter-spacing: 0.1em;
    }

    /* ── RESULT PANEL ──────────────────────────────────── */
    .result {
      margin-top: 18px; padding: 16px;
      border-radius: var(--r-sm); border: 1px solid;
      animation: slideIn .28s ease;
    }
    @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }
    .result-ok    { background: var(--accent-dim);  border-color: rgba(0,211,149,.22); }
    .result-flag  { background: var(--danger-dim);  border-color: rgba(255,68,68,.22); }
    .result-fail  { background: rgba(22,27,34,.6);  border-color: var(--border); }

    .result-title {
      font-size: 0.95rem; font-weight: 700;
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .result-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      margin-top: 10px;
    }
    .rg-item { display: flex; flex-direction: column; gap: 2px; }
    .rg-k { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-dim); }
    .rg-v { font-size: 0.85rem; font-weight: 600; color: var(--text); }

    /* ── FRAUD FLAG CARDS ──────────────────────────────── */
    .flag-card {
      background: var(--bg-card);
      border: 1px solid var(--border); border-left: 3px solid var(--danger);
      border-radius: var(--r); padding: 18px;
      display: flex; flex-direction: column; gap: 14px;
      transition: border-color .14s;
    }
    .flag-card:hover { border-color: var(--danger); border-left-color: var(--danger); }

    .risk-ring {
      width: 54px; height: 54px; border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border: 2.5px solid; flex-shrink: 0;
    }
    .risk-num   { font-size: 1.05rem; font-weight: 900; line-height: 1; }
    .risk-lbl   { font-size: 0.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
    .r-low      { border-color: var(--accent);  color: var(--accent);  }
    .r-med      { border-color: var(--warning); color: var(--warning); }
    .r-high     { border-color: var(--danger);  color: var(--danger);  }

    .ai-box {
      background: rgba(0,0,0,.22); border: 1px solid var(--border-lt);
      border-radius: var(--r-xs); padding: 11px;
      font-size: 0.80rem; color: var(--text-muted); line-height: 1.65;
    }
    .ai-lbl {
      font-size: 0.62rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .09em;
      color: var(--text-dim); margin-bottom: 5px;
    }

    /* ── STAT CARDS ────────────────────────────────────── */
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 18px;
      position: relative; overflow: hidden;
      transition: border-color .14s, transform .14s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-icon {
      width: 38px; height: 38px; border-radius: var(--r-xs);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
    }
    .stat-icon svg { width: 19px; height: 19px; }
    .stat-val  { font-size: 1.9rem; font-weight: 900; letter-spacing: -0.03em; line-height: 1; margin-bottom: 3px; }
    .stat-lbl  { font-size: 0.78rem; color: var(--text-muted); font-weight: 500; }

    /* ── ADMIN SUB-TABS ────────────────────────────────── */
    .sub-tabs {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--border); margin-bottom: 22px;
    }
    .sub-tab {
      padding: 9px 18px;
      border: none; background: transparent;
      color: var(--text-muted); font-family: inherit;
      font-size: 0.86rem; font-weight: 500; cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: all .14s ease;
    }
    .sub-tab.active  { color: var(--accent); border-bottom-color: var(--accent); }
    .sub-tab:hover:not(.active) { color: var(--text); }

    /* ── EMPTY / NOT LOGGED IN ─────────────────────────── */
    .empty {
      display: flex; flex-direction: column; align-items: center;
      padding: 72px 24px; text-align: center; color: var(--text-muted);
    }
    .empty-icon {
      width: 52px; height: 52px; margin-bottom: 16px;
      opacity: 0.25; display: block;
    }
    .empty h3 { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty p  { font-size: 0.85rem; margin-bottom: 18px; }

    /* ── DIVIDER ───────────────────────────────────────── */
    .div { height: 1px; background: var(--border); margin: 16px 0; }

    /* ── ALERT ─────────────────────────────────────────── */
    .alert {
      padding: 10px 14px; border-radius: var(--r-xs);
      border: 1px solid; display: flex; align-items: flex-start; gap: 9px;
      font-size: 0.82rem; margin-bottom: 14px;
    }
    .alert svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px; }
    .alert-warn { background: var(--warning-dim); border-color: rgba(255,140,0,.2); color: var(--warning); }
    .alert-info { background: var(--blue-dim);    border-color: rgba(56,139,253,.2); color: var(--blue);   }

    /* ── COPY BTN ──────────────────────────────────────── */
    .copy-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-dim); padding: 2px; border-radius: 4px;
      display: inline-flex; transition: color .14s;
    }
    .copy-btn:hover { color: var(--accent); }
    .copy-btn svg { width: 12px; height: 12px; }

    /* ── SPENDER ROW ───────────────────────────────────── */
    .sp-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid var(--border-lt);
    }
    .sp-row:last-child { border-bottom: none; }
    .sp-rank {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.68rem; font-weight: 700; color: var(--text-muted);
      margin-right: 10px; flex-shrink: 0;
    }
    .sp-email  { font-size: 0.85rem; font-weight: 500; }
    .sp-amount { font-size: 0.85rem; font-weight: 700; color: var(--accent); }

    /* ── LOGGED IN USER CARD ───────────────────────────── */
    .logged-card {
      background: linear-gradient(135deg, #0b2117 0%, var(--bg-card) 100%);
      border-color: rgba(0,211,149,.2);
    }
    .logged-av {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #00a876);
      color: #000; font-size: 0.9rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <a class="brand" href="#">
    <div class="brand-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
      </svg>
    </div>
    <span class="brand-name">Sentinel<em>Pay</em></span>
  </a>

  <nav class="tab-nav" id="tabNav"></nav>

  <div class="header-right" id="hdrRight"></div>
</header>

<!-- TOASTS -->
<div id="toasts"></div>

<!-- MAIN -->
<main class="main" id="main"></main>

<script>
// ═══════════════════════════════════════════════════
//  CONSTANTS & STATE
// ═══════════════════════════════════════════════════
const BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:'
  ? 'http://localhost:3001'
  : 'https://sentinelpay-api-j9o5.onrender.com';

const S = {
  token:        null,  // access token
  refreshToken: null,
  user:         null,  // { id, email, role }
  tab:          'auth',
  adminSub:     'users',
  wallet:       null,
};

const TABS = [
  { id: 'auth',         label: 'Auth',          icon: 'lock'        },
  { id: 'wallet',       label: 'Wallet',        icon: 'credit-card' },
  { id: 'transfer',     label: 'Transfer',      icon: 'send'        },
  { id: 'transactions', label: 'Transactions',  icon: 'list'        },
  { id: 'mpesa',        label: 'M-Pesa Sim',    icon: 'smartphone'  },
  { id: 'admin',        label: 'Admin',         icon: 'shield', admin: true },
];

const PRESETS = [
  { name:'Alice', email:'alice@example.com',        password:'User123!',  role:'CUSTOMER', color:'#00d395', init:'AL' },
  { name:'Bob',   email:'bob@example.com',          password:'User123!',  role:'CUSTOMER', color:'#388bfd', init:'BO' },
  { name:'Admin', email:'admin@sentinelpay.com',    password:'Admin123!', role:'ADMIN',    color:'#ff8c00', init:'AD' },
];

// ═══════════════════════════════════════════════════
//  API HELPER
// ═══════════════════════════════════════════════════
async function api(method, path, body, noAuth) {
  const hdrs = { 'Content-Type': 'application/json' };
  if (S.token && !noAuth) hdrs['Authorization'] = `Bearer ${S.token}`;

  const opts = { method, headers: hdrs };
  if (body) opts.body = JSON.stringify(body);

  let res = await fetch(BASE + path, opts);

  // Auto-refresh on 401
  if (res.status === 401 && S.refreshToken && !noAuth) {
    const rr = await fetch(BASE + '/api/auth/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refreshToken: S.refreshToken }),
    });
    if (rr.ok) {
      const rd = await rr.json();
      S.token = rd.data.accessToken;
      hdrs['Authorization'] = `Bearer ${S.token}`;
      res = await fetch(BASE + path, { method, headers: hdrs, body: opts.body });
    } else {
      doLogout();
      throw new Error('Session expired — please sign in again.');
    }
  }

  const json = await res.json();
  if (!res.ok) throw new Error(json.message || `Error ${res.status}`);
  return json;
}

// ═══════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════
function toast(msg, type = 'ok') {
  const icons = { ok: 'check-circle', err: 'alert-circle', warn: 'alert-triangle' };
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<i data-feather="${icons[type] || 'info'}"></i><span>${esc(msg)}</span>`;
  document.getElementById('toasts').appendChild(el);
  feather.replace();
  setTimeout(() => {
    el.style.animation = 'tOut .28s ease forwards';
    setTimeout(() => el.remove(), 280);
  }, 4200);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fkes(n) {
  return new Intl.NumberFormat('en-KE', { minimumFractionDigits:2, maximumFractionDigits:2 }).format(Number(n));
}

function fdt(d) {
  return new Date(d).toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
}

function statusBadge(s) {
  const m = { COMPLETED:'b-green', FLAGGED:'b-red', PENDING:'b-orange', FAILED:'b-gray', MPESA_CREDIT:'b-blue', MPESA_DEBIT:'b-orange' };
  return `<span class="badge ${m[s]||'b-gray'}">${esc(s)}</span>`;
}

function typeBadge(t) {
  const m = { TRANSFER:'b-blue', MPESA_CREDIT:'b-green', MPESA_DEBIT:'b-orange' };
  const l = { TRANSFER:'Transfer', MPESA_CREDIT:'M-Pesa In', MPESA_DEBIT:'M-Pesa Out' };
  return `<span class="badge ${m[t]||'b-gray'}">${l[t]||esc(t)}</span>`;
}

function roleBadge(r) {
  const m = { ADMIN:'r-admin', CUSTOMER:'r-customer', EMPLOYEE:'r-employee' };
  return `<span class="role-badge ${m[r]||''}">${r}</span>`;
}

function riskClass(n) {
  return n >= 75 ? 'r-high' : n >= 50 ? 'r-med' : 'r-low';
}

function recBadge(r) {
  const m = { BLOCK:'b-red', REVIEW:'b-orange', ALLOW:'b-green' };
  return r ? `<span class="badge ${m[r]||'b-gray'}">${r}</span>` : '';
}

function parseAi(raw) {
  try {
    const p = JSON.parse(raw);
    return { reason: p.reason || raw, rec: p.recommendation || null, score: p.riskScore || null };
  } catch { return { reason: raw, rec: null, score: null }; }
}

function spin()  { return `<div class="spinner"></div>`; }
function load(t) { return `<div class="loading-box">${spin()}<span>${t||'Loading...'}</span></div>`; }

function empty(icon, title, sub, btn='') {
  return `<div class="empty">
    <i data-feather="${icon}" class="empty-icon"></i>
    <h3>${title}</h3><p>${sub}</p>${btn}
  </div>`;
}

function gotoAuth() {
  return `<button class="btn btn-primary" onclick="goTab('auth')">
    <i data-feather="log-in"></i> Go to Login
  </button>`;
}

function notAuth(action) {
  return empty('lock', 'Authentication Required', `Please log in to ${action}.`, gotoAuth());
}

// ═══════════════════════════════════════════════════
//  HEADER
// ═══════════════════════════════════════════════════
function renderHdr() {
  // Tabs
  document.getElementById('tabNav').innerHTML = TABS
    .filter(t => !t.admin || (S.user && S.user.role === 'ADMIN'))
    .map(t => `
      <button class="tab-btn ${S.tab===t.id?'active':''} ${t.admin?'is-admin':''}"
        onclick="goTab('${t.id}')">
        <i data-feather="${t.icon}"></i>${t.label}
      </button>
    `).join('');

  // User area
  const r = document.getElementById('hdrRight');
  if (S.user) {
    const init = S.user.email.slice(0,2).toUpperCase();
    r.innerHTML = `
      <div class="user-pill">
        <div class="user-avatar">${init}</div>
        <div>
          <div class="user-email-sm">${esc(S.user.email.split('@')[0])}</div>
          <div class="user-role-sm">${S.user.role}</div>
        </div>
        ${roleBadge(S.user.role)}
      </div>
      <button class="btn btn-ghost btn-sm" onclick="handleLogout()">
        <i data-feather="log-out"></i>
      </button>
    `;
  } else {
    r.innerHTML = `<span style="font-size:.78rem;color:var(--text-muted)">Not signed in</span>`;
  }
  feather.replace();
}

// ═══════════════════════════════════════════════════
//  TAB ROUTING
// ═══════════════════════════════════════════════════
function goTab(id) {
  S.tab = id;
  renderHdr();
  renderTab();
}

function goAdminSub(sub) {
  S.adminSub = sub;
  renderTab();
}

function renderTab() {
  const m = document.getElementById('main');
  const renders = {
    auth:         renderAuth,
    wallet:       renderWallet,
    transfer:     renderTransfer,
    transactions: renderTransactions,
    mpesa:        renderMpesa,
    admin:        renderAdmin,
  };
  m.innerHTML = (renders[S.tab] || renderAuth)();
  feather.replace();

  // Auto-load
  if (S.tab === 'wallet'       && S.user) loadWallet();
  if (S.tab === 'transactions' && S.user) loadTxns();
  if (S.tab === 'admin'        && S.user?.role === 'ADMIN') {
    if (S.adminSub === 'users') loadAdminUsers();
    if (S.adminSub === 'flags') loadAdminFlags();
    if (S.adminSub === 'stats') loadAdminStats();
  }
}

// ═══════════════════════════════════════════════════
//  TAB 1 — AUTH
// ═══════════════════════════════════════════════════
function renderAuth() {
  const loggedBlock = S.user ? `
    <div class="card logged-card" style="margin-top:16px;">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px;">
        <div class="logged-av">${S.user.email.slice(0,2).toUpperCase()}</div>
        <div>
          <div style="font-weight:700;">${esc(S.user.email)}</div>
          <div style="margin-top:3px;">${roleBadge(S.user.role)}</div>
        </div>
      </div>
      <div style="font-size:.8rem;color:var(--accent);display:flex;align-items:center;gap:6px;margin-bottom:14px;">
        <i data-feather="check-circle" style="width:13px;height:13px;"></i>
        Authenticated — session active
      </div>
      <button class="btn btn-danger btn-full" onclick="handleLogout()">
        <i data-feather="log-out"></i> Sign Out
      </button>
    </div>
  ` : '';

  return `
    <div class="page-hd">
      <div>
        <div class="page-title">Authentication</div>
        <div class="page-sub">Sign in to access your SentinelPay account</div>
      </div>
    </div>
    <div class="g2" style="max-width:820px;">
      <div>
        <div class="card">
          <div class="card-hd" style="margin-bottom:18px;">
            <div class="card-title"><i data-feather="log-in"></i> Sign In</div>
          </div>
          <div class="fg">
            <label class="flabel">Email Address</label>
            <input type="email" class="finput" id="lEmail" placeholder="you@example.com"
              value="${S.user ? esc(S.user.email) : ''}">
          </div>
          <div class="fg" style="margin-bottom:16px;">
            <label class="flabel">Password</label>
            <input type="password" class="finput" id="lPass" placeholder="••••••••"
              onkeydown="if(event.key==='Enter') handleLogin()">
          </div>
          <button class="btn btn-primary btn-full" id="loginBtn" onclick="handleLogin()">
            <i data-feather="log-in"></i><span>Sign In</span>
          </button>
        </div>
        ${loggedBlock}
      </div>

      <div>
        <div style="font-size:.8rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;">
          Quick Login
        </div>
        <div style="display:flex;flex-direction:column;gap:9px;">
          ${PRESETS.map(p=>`
            <button class="preset-btn" onclick="fillLogin('${p.email}','${p.password}')">
              <div class="p-avatar" style="background:${p.color}1a;color:${p.color};">${p.init}</div>
              <div style="flex:1;">
                <div class="p-name">${p.name}</div>
                <div class="p-email">${p.email} &nbsp;·&nbsp; ${p.role}</div>
              </div>
              <i data-feather="arrow-right" style="width:15px;height:15px;color:var(--text-dim);"></i>
            </button>
          `).join('')}
        </div>

        <div class="card" style="margin-top:16px;">
          <div class="card-title" style="margin-bottom:10px;font-size:.82rem;">
            <i data-feather="info"></i> Test Wallets
          </div>
          <div style="font-size:.79rem;color:var(--text-muted);line-height:2;">
            Alice: <code class="mono">1000000003</code> &nbsp;·&nbsp; 500,000 KES<br>
            Bob: <code class="mono">1000000004</code> &nbsp;·&nbsp; 250,000 KES
          </div>
        </div>
      </div>
    </div>
  `;
}

function fillLogin(email, pass) {
  document.getElementById('lEmail').value = email;
  document.getElementById('lPass').value  = pass;
  toast('Credentials filled — click Sign In', 'ok');
}

async function handleLogin() {
  const email = (document.getElementById('lEmail').value || '').trim();
  const pass  =  document.getElementById('lPass').value  || '';
  if (!email || !pass) { toast('Email and password required', 'err'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = `${spin()} Signing in…`;

  try {
    const d = await api('POST', '/api/auth/login', { email, password: pass }, true);
    S.token        = d.data.tokens.accessToken;
    S.refreshToken = d.data.tokens.refreshToken;
    S.user         = d.data.user;
    toast(`Welcome, ${S.user.email.split('@')[0]}!`, 'ok');
    renderHdr(); renderTab();
  } catch (e) {
    toast(e.message, 'err');
    btn.disabled = false;
    btn.innerHTML = `<i data-feather="log-in"></i><span>Sign In</span>`;
    feather.replace();
  }
}

async function handleLogout() {
  if (S.refreshToken) {
    try { await api('POST', '/api/auth/logout', { refreshToken: S.refreshToken }); } catch {}
  }
  doLogout();
}

function doLogout() {
  S.token = null; S.refreshToken = null; S.user = null; S.wallet = null;
  toast('Signed out', 'ok');
  goTab('auth');
}

function renderWallet() {
  if (!S.user) return notAuth('view your wallet');
  return `
    <div class="page-hd">
      <div>
        <div class="page-title">Wallet</div>
        <div class="page-sub">Your KES balance and account details</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="loadWallet(true)">
        <i data-feather="refresh-cw"></i> Refresh
      </button>
    </div>
    <div style="max-width:560px;display:flex;flex-direction:column;gap:16px;">
      <div class="card balance-card" id="walCard">${load('Fetching balance…')}</div>
    </div>
  `;
}

async function loadWallet(toastIt) {
  const el = document.getElementById('walCard');
  if (!el) return;
  el.innerHTML = load('Fetching balance…');

  try {
    const d   = await api('GET', '/api/wallet/me');
    S.wallet  = d.data;
    const [w, dec] = parseFloat(S.wallet.balance).toFixed(2).split('.');
    const fmt = parseInt(w).toLocaleString('en-KE');

    el.innerHTML = `
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;">
        <div style="flex:1;">
          <div class="balance-lbl">Available Balance</div>
          <div class="balance-amt">
            <span class="balance-cur">KES</span>${fmt}<span class="balance-dec">.${dec}</span>
          </div>
          <div class="balance-acc">
            Account&nbsp;<code>${esc(S.wallet.accountNumber)}</code>
            <button class="copy-btn" onclick="copyIt('${esc(S.wallet.accountNumber)}')" title="Copy">
              <i data-feather="copy"></i>
            </button>
          </div>
          <div style="margin-top:8px;font-size:.76rem;color:var(--text-dim);">
            Currency: ${S.wallet.currency} &nbsp;·&nbsp; Updated just now
          </div>
        </div>
        <div style="background:var(--accent-dim);border-radius:10px;padding:12px;">
          <i data-feather="credit-card" style="color:var(--accent);width:26px;height:26px;"></i>
        </div>
      </div>
    `;
    feather.replace();
    if (toastIt) toast('Balance refreshed', 'ok');
  } catch (e) {
    el.innerHTML = `<div style="color:var(--danger);font-size:.85rem;">${esc(e.message)}</div>`;
    toast(e.message, 'err');
  }
}

function copyIt(t) {
  navigator.clipboard.writeText(t).then(()=>toast('Copied!', 'ok'));
}

function fillTx(to, amt, desc) {
  document.getElementById('txTo').value   = to;
  document.getElementById('txAmt').value  = amt;
  document.getElementById('txDesc').value = desc;
}

async function handleTransfer() {
  const to   = (document.getElementById('txTo').value  || '').trim();
  const amt  = parseFloat(document.getElementById('txAmt').value);
  const desc = (document.getElementById('txDesc').value || '').trim();

  if (!to || to.length !== 10 || !/^\d+$/.test(to)) { toast('Enter a valid 10-digit account number', 'err'); return; }
  if (!amt || amt <= 0) { toast('Enter a valid positive amount', 'err'); return; }

  const btn = document.getElementById('txBtn');
  btn.disabled = true;
  btn.innerHTML = `${spin()} Processing…`;

  const result = document.getElementById('txResult');
  result.innerHTML = '';

  try {
    const d  = await api('POST', '/api/transactions/transfer', { toAccountNumber: to, amount: amt, description: desc || undefined });
    const tx = d.data;
    const flagged = tx.status === 'FLAGGED';

    result.innerHTML = `
      <div class="result ${flagged ? 'result-flag' : 'result-ok'}">
        <div class="result-title" style="color:${flagged ? 'var(--danger)' : 'var(--accent)'};">
          <i data-feather="${flagged ? 'alert-triangle' : 'check-circle'}"></i>
          ${flagged ? '⚠️ Transaction Flagged for Fraud Review' : '✅ Transfer Successful'}
        </div>
        ${flagged ? `<div style="font-size:.82rem;color:var(--text-muted);margin-bottom:10px;">
          Our AI fraud detection system has flagged this transfer for review based on risk rules.
        </div>` : ''}
        <div class="result-grid">
          <div class="rg-item"><span class="rg-k">Transaction ID</span><span class="rg-v mono" style="font-size:.7rem;">${esc(tx.id)}</span></div>
          <div class="rg-item"><span class="rg-k">Amount</span><span class="rg-v">KES ${fkes(tx.amount)}</span></div>
          <div class="rg-item"><span class="rg-k">Status</span><span class="rg-v">${statusBadge(tx.status)}</span></div>
          <div class="rg-item"><span class="rg-k">Time</span><span class="rg-v">${fdt(tx.createdAt)}</span></div>
        </div>
      </div>
    `;
    feather.replace();
    flagged ? toast('Transfer flagged for review!', 'warn') : toast('Transfer completed!', 'ok');
  } catch (e) {
    result.innerHTML = `
      <div class="result result-fail">
        <div class="result-title" style="color:var(--danger);">
          <i data-feather="x-circle"></i> Transfer Failed
        </div>
        <div style="font-size:.84rem;color:var(--text-muted);">${esc(e.message)}</div>
      </div>
    `;
    feather.replace();
    toast(e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<i data-feather="send"></i><span>Send Transfer</span>`;
    feather.replace();
  }
}

// ═══════════════════════════════════════════════════

function renderTransactions() {
  if (!S.user) return notAuth('view transactions');
  return `
    <div class="page-hd">
      <div>
        <div class="page-title">Transaction History</div>
        <div class="page-sub">Your recent send and receive activity</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="loadTxns(true)">
        <i data-feather="refresh-cw"></i> Refresh
      </button>
    </div>
    <div class="card" id="txCard">${load('Loading transactions…')}</div>
  `;
}

async function loadTxns(toastIt) {
  const el = document.getElementById('txCard');
  if (!el) return;
  el.innerHTML = load('Loading transactions…');

  try {
    const d    = await api('GET', '/api/transactions?limit=30');
    const txns = d.data.transactions;

    if (!txns.length) {
      el.innerHTML = empty('inbox', 'No Transactions', 'Make a transfer to get started.');
      feather.replace(); return;
    }

    el.innerHTML = `
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>Date</th><th>Type</th><th>Amount</th><th>Status</th><th>Description</th><th>ID</th>
          </tr></thead>
          <tbody>
            ${txns.map(t => {
              const sent  = t.type === 'TRANSFER' && t.senderId === S.user.id;
              const color = sent ? 'var(--danger)' : 'var(--accent)';
              const sign  = sent ? '−' : '+';
              return `
                <tr>
                  <td style="color:var(--text-muted);font-size:.78rem;white-space:nowrap;">${fdt(t.createdAt)}</td>
                  <td>${typeBadge(t.type)}</td>
                  <td style="font-weight:700;color:${color};font-variant-numeric:tabular-nums;white-space:nowrap;">
                    ${sign}KES ${fkes(t.amount)}
                  </td>
                  <td>${statusBadge(t.status)}</td>
                  <td style="color:var(--text-muted);font-size:.80rem;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
                    ${t.description ? esc(t.description) : '—'}
                  </td>
                  <td class="mono" style="color:var(--text-dim);font-size:.70rem;">${t.id.slice(0,8)}…</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
      <div style="padding:10px 0 0;font-size:.76rem;color:var(--text-dim);">
        Showing ${txns.length} of ${d.data.total}
      </div>
    `;
    feather.replace();
    if (toastIt) toast('Transactions refreshed', 'ok');
  } catch (e) {
    el.innerHTML = `<div style="color:var(--danger);padding:16px;font-size:.85rem;">${esc(e.message)}</div>`;
    toast(e.message, 'err');
  }
}

// ═══════════════════════════════════════════════════
//  TAB 5 — M-PESA SIM
// ═══════════════════════════════════════════════════
function renderMpesa() {
  return `
    <div class="page-hd">
      <div>
        <div class="page-title">M-Pesa Simulator</div>
        <div class="page-sub">Simulate an STK push callback to credit a wallet</div>
      </div>
    </div>
    <div class="g2" style="max-width:880px;align-items:start;">
      <div class="card">
        <div class="card-hd" style="margin-bottom:18px;">
          <div class="card-title"><i data-feather="smartphone"></i> STK Push Simulation</div>
        </div>
        <div class="alert alert-warn">
          <i data-feather="alert-triangle"></i>
          <span>Simulation only — no real M-Pesa charges occur.</span>
        </div>
        <div class="fg">
          <label class="flabel">Account Number</label>
          <input type="text" class="finput" id="mpAcc" placeholder="1000000003" maxlength="10" value="1000000003">
        </div>
        <div class="fg">
          <label class="flabel">Amount (KES)</label>
          <input type="number" class="finput" id="mpAmt" placeholder="5000" value="5000" min="1">
        </div>
        <div class="fg">
          <label class="flabel">M-Pesa Reference</label>
          <input type="text" class="finput" id="mpRef" placeholder="QJK2LS9KDF" value="QJK2LS9KDF">
        </div>
        <div class="fg" style="margin-bottom:16px;">
          <label class="flabel">Phone Number</label>
          <input type="text" class="finput" id="mpPhone" placeholder="254712345678" value="254712345678">
        </div>
        <button class="btn btn-primary btn-full" id="mpBtn" onclick="handleMpesa()">
          <i data-feather="zap"></i><span>Simulate STK Push</span>
        </button>
      </div>

      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="card">
          <div class="card-title" style="margin-bottom:12px;font-size:.82rem;">
            <i data-feather="info"></i> How it works
          </div>
          <ol style="font-size:.80rem;color:var(--text-muted);padding-left:16px;line-height:2.1;">
            <li>Finds wallet by account number</li>
            <li>Credits the balance instantly</li>
            <li>Creates an <code class="mono">MPESA_CREDIT</code> transaction</li>
            <li>Returns the transaction details</li>
          </ol>
          <div class="div"></div>
          <div style="font-size:.78rem;color:var(--text-muted);line-height:2;">
            <strong style="color:var(--text);">Test accounts:</strong><br>
            Alice → <code class="mono">1000000003</code><br>
            Bob &nbsp;&nbsp;→ <code class="mono">1000000004</code>
          </div>
        </div>

        <div id="mpResult"></div>
      </div>
    </div>
  `;
}

async function handleMpesa() {
  const acc   = (document.getElementById('mpAcc').value   || '').trim();
  const amt   = parseFloat(document.getElementById('mpAmt').value);
  const ref   = (document.getElementById('mpRef').value   || '').trim();
  const phone = (document.getElementById('mpPhone').value || '').trim();

  if (!acc || !amt || !ref || !phone) { toast('All fields required', 'err'); return; }

  const btn = document.getElementById('mpBtn');
  btn.disabled = true; btn.innerHTML = `${spin()} Processing…`;

  const res = document.getElementById('mpResult');
  res.innerHTML = '';

  try {
    const d  = await api('POST', '/api/mpesa/callback', { accountNumber: acc, amount: amt, mpesaRef: ref, phoneNumber: phone });
    const tx = d.data;
    res.innerHTML = `
      <div class="result result-ok">
        <div class="result-title" style="color:var(--accent);">
          <i data-feather="check-circle"></i> M-Pesa Credit Processed
        </div>
        <div class="result-grid">
          <div class="rg-item"><span class="rg-k">Transaction ID</span><span class="rg-v mono" style="font-size:.68rem;">${esc(tx.transactionId)}</span></div>
          <div class="rg-item"><span class="rg-k">Credited</span><span class="rg-v">KES ${fkes(tx.amount)}</span></div>
          <div class="rg-item"><span class="rg-k">Status</span><span class="rg-v">${statusBadge(tx.status)}</span></div>
          <div class="rg-item"><span class="rg-k">Time</span><span class="rg-v">${fdt(tx.createdAt)}</span></div>
        </div>
        <div style="margin-top:10px;font-size:.76rem;color:var(--text-muted);">${esc(tx.description || '')}</div>
      </div>
    `;
    feather.replace();
    toast('M-Pesa credit successful!', 'ok');
  } catch (e) {
    res.innerHTML = `
      <div class="result result-fail">
        <div class="result-title" style="color:var(--danger);"><i data-feather="x-circle"></i> Failed</div>
        <div style="font-size:.84rem;color:var(--text-muted);">${esc(e.message)}</div>
      </div>
    `;
    feather.replace();
    toast(e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<i data-feather="zap"></i><span>Simulate STK Push</span>`;
    feather.replace();
  }
}

// ═══════════════════════════════════════════════════
//  TAB 6 — ADMIN
// ═══════════════════════════════════════════════════
function renderAdmin() {
  if (!S.user || S.user.role !== 'ADMIN') {
    return empty('shield-off', 'Admin Access Required', 'Only administrators can view this section.');
  }
  return `
    <div class="page-hd">
      <div>
        <div class="page-title">Admin Panel</div>
        <div class="page-sub">Platform management, users, fraud monitoring, and analytics</div>
      </div>
    </div>
    <div class="sub-tabs">
      <button class="sub-tab ${S.adminSub==='users' ?'active':''}" onclick="goAdminSub('users')">Users</button>
      <button class="sub-tab ${S.adminSub==='flags' ?'active':''}" onclick="goAdminSub('flags')">Fraud Flags</button>
      <button class="sub-tab ${S.adminSub==='stats' ?'active':''}" onclick="goAdminSub('stats')">Stats</button>
    </div>
    <div id="adminBody">${load()}</div>
  `;
}

// Admin — Users
async function loadAdminUsers() {
  const el = document.getElementById('adminBody');
  if (!el) return;
  el.innerHTML = load('Loading users…');

  try {
    const d = await api('GET', '/api/admin/users?limit=50');
    const users = d.data.users;

    el.innerHTML = `
      <div class="card">
        <div class="card-hd">
          <div class="card-title"><i data-feather="users"></i> All Users (${d.data.total})</div>
          <button class="btn btn-ghost btn-sm" onclick="loadAdminUsers()">
            <i data-feather="refresh-cw"></i>
          </button>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>Email</th><th>Role</th><th>Account No.</th>
              <th style="text-align:right;">Balance (KES)</th><th>Joined</th>
            </tr></thead>
            <tbody>
              ${users.map(u=>`
                <tr>
                  <td style="font-weight:600;">${esc(u.email)}</td>
                  <td>${roleBadge(u.role)}</td>
                  <td class="mono">${u.wallet ? esc(u.wallet.accountNumber) : '—'}</td>
                  <td style="text-align:right;font-weight:700;color:var(--accent);">
                    ${u.wallet ? fkes(u.wallet.balance) : '—'}
                  </td>
                  <td style="color:var(--text-muted);font-size:.78rem;">${fdt(u.createdAt)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
    feather.replace();
  } catch (e) {
    el.innerHTML = `<div style="color:var(--danger);">${esc(e.message)}</div>`;
    toast(e.message, 'err');
  }
}

// Admin — Fraud Flags
async function loadAdminFlags() {
  const el = document.getElementById('adminBody');
  if (!el) return;
  el.innerHTML = load('Loading fraud flags…');

  try {
    const d     = await api('GET', '/api/admin/flags');
    const flags = d.data.flags;

    if (!flags.length) {
      el.innerHTML = empty('check-circle', 'No Fraud Flags', 'All transactions appear clean.', '');
      el.querySelector('.empty-icon').style.color = 'var(--accent)';
      feather.replace(); return;
    }

    el.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div style="font-size:.84rem;color:var(--text-muted);">
          <span style="color:var(--danger);font-weight:700;">${flags.length}</span> fraud flag${flags.length!==1?'s':''} detected
        </div>
        <button class="btn btn-ghost btn-sm" onclick="loadAdminFlags()"><i data-feather="refresh-cw"></i></button>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        ${flags.map(f => {
          const ai  = parseAi(f.aiAnalysis);
          const tx  = f.transaction;
          const rc  = riskClass(f.riskScore);
          return `
            <div class="flag-card">
              <div style="display:flex;align-items:flex-start;gap:14px;">
                <div class="risk-ring ${rc}">
                  <span class="risk-num">${f.riskScore}</span>
                  <span class="risk-lbl">Risk</span>
                </div>
                <div style="flex:1;min-width:0;">
                  <div style="font-size:.70rem;color:var(--text-dim);font-family:monospace;margin-bottom:3px;">
                    #${f.transactionId.slice(0,12)}…
                  </div>
                  <div style="font-size:.92rem;font-weight:700;">
                    ${esc(tx.sender?.email||'?')} → ${esc(tx.receiver?.email||'?')}
                  </div>
                  <div style="font-size:1.05rem;font-weight:900;color:var(--danger);margin-top:3px;">
                    KES ${fkes(tx.amount)}
                  </div>
                </div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">
                  ${statusBadge(tx.status)}
                  ${recBadge(ai.rec)}
                  <span style="font-size:.68rem;color:var(--text-dim);">${fdt(f.createdAt)}</span>
                </div>
              </div>
              <div>
                <div class="ai-lbl">Rule Triggered</div>
                <div style="font-size:.82rem;color:var(--text);margin-bottom:10px;">${esc(f.reason)}</div>
                <div class="ai-lbl">AI Analysis</div>
                <div class="ai-box">${esc(ai.reason)}</div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
    feather.replace();
  } catch (e) {
    el.innerHTML = `<div style="color:var(--danger);">${esc(e.message)}</div>`;
    toast(e.message, 'err');
  }
}

// Admin — Stats
async function loadAdminStats() {
  const el = document.getElementById('adminBody');
  if (!el) return;
  el.innerHTML = load('Loading statistics…');

  try {
    const d = await api('GET', '/api/admin/stats');
    const s = d.data;

    el.innerHTML = `
      <div class="g4" style="margin-bottom:20px;">
        <div class="stat-card" style="border-color:rgba(0,211,149,.18);">
          <div class="stat-icon" style="background:var(--accent-dim);color:var(--accent);"><i data-feather="users"></i></div>
          <div class="stat-val" style="color:var(--text);">${s.totalUsers}</div>
          <div class="stat-lbl">Total Users</div>
        </div>
        <div class="stat-card" style="border-color:rgba(56,139,253,.18);">
          <div class="stat-icon" style="background:var(--blue-dim);color:var(--blue);"><i data-feather="activity"></i></div>
          <div class="stat-val" style="color:var(--text);">${s.totalTransactions}</div>
          <div class="stat-lbl">Transactions</div>
        </div>
        <div class="stat-card" style="border-color:rgba(255,68,68,.18);">
          <div class="stat-icon" style="background:var(--danger-dim);color:var(--danger);"><i data-feather="alert-triangle"></i></div>
          <div class="stat-val" style="color:var(--danger);">${s.flaggedCount}</div>
          <div class="stat-lbl">Flagged Transactions</div>
        </div>
        <div class="stat-card" style="border-color:rgba(0,211,149,.18);">
          <div class="stat-icon" style="background:var(--accent-dim);color:var(--accent);"><i data-feather="trending-up"></i></div>
          <div class="stat-val" style="color:var(--accent);font-size:1.3rem;">${fkes(s.totalVolume)}</div>
          <div class="stat-lbl">Volume (KES)</div>
        </div>
      </div>

      ${s.topSpenders && s.topSpenders.length ? `
        <div class="card">
          <div class="card-title" style="margin-bottom:14px;">
            <i data-feather="award"></i> Top Spenders
          </div>
          ${s.topSpenders.map((sp,i)=>`
            <div class="sp-row">
              <div style="display:flex;align-items:center;">
                <div class="sp-rank">${i+1}</div>
                <span class="sp-email">${esc(sp.email)}</span>
              </div>
              <span class="sp-amount">KES ${fkes(sp.totalSent)}</span>
            </div>
          `).join('')}
        </div>
      ` : ''}

      <div class="card" style="margin-top:14px;">
        <div class="card-title" style="margin-bottom:14px;">
          <i data-feather="bar-chart-2"></i> Quick Summary
        </div>
        <div style="font-size:.84rem;color:var(--text-muted);line-height:2;">
          Fraud rate: <strong style="color:${s.flaggedCount>0?'var(--danger)':'var(--accent)'};">
            ${s.totalTransactions > 0 ? ((s.flaggedCount/s.totalTransactions)*100).toFixed(1) : 0}%
          </strong>
          &nbsp;·&nbsp;
          Avg transaction: <strong style="color:var(--text);">
            KES ${s.totalTransactions > 0 ? fkes(parseFloat(s.totalVolume)/s.totalTransactions) : '0.00'}
          </strong>
        </div>
      </div>
    `;
    feather.replace();
  } catch (e) {
    el.innerHTML = `<div style="color:var(--danger);">${esc(e.message)}</div>`;
    toast(e.message, 'err');
  }
}
